services:
  onbrand-mcp:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    expose:
      - "8080"

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-onbrand}
      POSTGRES_USER: ${POSTGRES_USER:-onbrand}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - onbrand-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  onbrand-postgres-data:
