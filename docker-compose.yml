services:
  onbrand-mcp:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: onbrand
      POSTGRES_USER: onbrand
      POSTGRES_PASSWORD: onbrand
    ports:
      - "5433:5432"
    volumes:
      - onbrand-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onbrand -d onbrand"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  onbrand-postgres-data:
