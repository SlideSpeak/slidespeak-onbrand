services:
  onbrand-mcp:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://onbrand:onbrand@postgres:5432/onbrand?schema=public
      BASE_URL: ${ONBRAND_BASE_URL:-http://localhost:8080}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
      PORT: 8080
      SLIDESPEAK_OAUTH_ISSUER: ${SLIDESPEAK_OAUTH_ISSUER:-http://localhost:3000}
      SLIDESPEAK_JWKS_URL: ${SLIDESPEAK_JWKS_URL:-http://host.docker.internal:3000/oauth/jwks.json}
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: onbrand
      POSTGRES_USER: onbrand
      POSTGRES_PASSWORD: onbrand
    ports:
      - "5433:5432"
    volumes:
      - onbrand-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onbrand -d onbrand"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  onbrand-postgres-data:
